<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arbeitszeit Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial}
body{background:#0f172a;color:white;padding:15px}
.container{max-width:520px;margin:auto}
h1{text-align:center;margin-bottom:10px}
input,button{width:100%;padding:12px;margin-top:10px;border-radius:10px;border:none;font-size:16px}
button{background:#38bdf8;color:black;font-weight:bold}
.card{background:#1e293b;padding:12px;margin-top:12px;border-radius:12px}
.log{background:#334155;padding:8px;margin-top:6px;border-radius:8px;display:flex;justify-content:space-between}
.total{text-align:center;margin-top:12px;font-weight:bold}
.row{display:flex;gap:8px}
.row button{flex:1}
.nav{display:flex;gap:6px}
.nav button{flex:1;background:#22c55e}
.status{margin-top:6px;font-weight:bold}
.running{color:#4ade80}
.pause{color:#facc15}
.done{color:#94a3b8}
</style>
</head>
<body>
<div class="container">
<h1>Arbeitszeit Tracker</h1>

<div class="nav">
<button id="prevDay">⬅️</button>
<input type="date" id="date">
<button id="nextDay">➡️</button>
</div>

<button id="resetDay">Tag zurücksetzen</button>

<div class="total" id="dayTotal"></div>
<div class="total" id="weekTotal"></div>
<div class="total" id="live"></div>
<div id="weekList" class="total"></div>

<input type="text" id="branchInput" placeholder="Filiale hinzufügen">
<button id="addBranchBtn">Filiale hinzufügen</button>

<div id="branches"></div>
</div>

<script>
const dateInput=document.getElementById("date");
const branchInput=document.getElementById("branchInput");
const branchesDiv=document.getElementById("branches");
const dayTotalDiv=document.getElementById("dayTotal");
const weekTotalDiv=document.getElementById("weekTotal");
const liveDiv=document.getElementById("live");
const weekListDiv=document.getElementById("weekList");

let data=JSON.parse(localStorage.getItem("tracker")||"{}");
let lastClick=0;

(function(){const d=new Date();dateInput.value=d.toISOString().split('T')[0]})();

function save(){localStorage.setItem("tracker",JSON.stringify(data))}
function getDay(){return dateInput.value}
function ensureDay(d){if(!data[d])data[d]={}}

function changeDay(o){let d=new Date(getDay());d.setDate(d.getDate()+o);dateInput.value=d.toISOString().split('T')[0];render()}
document.getElementById("prevDay").onclick=()=>changeDay(-1)
document.getElementById("nextDay").onclick=()=>changeDay(1)

function nowHM(){let d=new Date();return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`}
function parseHM(h){let m=/^([01]?\d|2[0-3]):([0-5]\d)$/.exec(h);return m?parseInt(m[1])*60+parseInt(m[2]):NaN}
function fmt(min){let h=Math.floor(min/60);let m=min%60;return `${h}h ${m}min`}

function addBranch(){let n=branchInput.value.trim();let d=getDay();if(!n||!d)return;ensureDay(d);if(!data[d][n])data[d][n]=[];branchInput.value="";save();render()}
document.getElementById("addBranchBtn").onclick=addBranch;

function sortLogs(l){l.sort((a,b)=>parseHM(a.time)-parseHM(b.time))}

function addLog(branch,type){
 if(Date.now()-lastClick<500)return;
 lastClick=Date.now();
 let d=getDay();ensureDay(d);
 if(!data[d][branch])data[d][branch]=[];
 data[d][branch].push({type,time:nowHM()});
 sortLogs(data[d][branch]);
 save();render()
}

function deleteLog(b,i){if(!confirm("Bist du sicher?"))return;data[getDay()][b].splice(i,1);save();render()}
function deleteBranch(b){if(!confirm("Bist du sicher?"))return;delete data[getDay()][b];save();render()}

function calcDay(d){
 let t=0;if(!data[d])return 0;
 Object.values(data[d]).forEach(l=>{
  let s=null,p=0,ps=null;
  l.forEach(x=>{
   let tm=parseHM(x.time);
   if(x.type==='Start')s=tm;
   if(x.type==='Pause Start')ps=tm;
   if(x.type==='Pause Ende'&&ps!=null){p+=tm-ps;ps=null}
   if(x.type==='Ende'&&s!=null){t+=Math.max(0,tm-s-p);s=null;p=0}
  })
 })
 return t
}

function calcWeek(){
 let d=new Date(getDay());
 let idx=(d.getDay()+6)%7;
 let mon=new Date(d);mon.setDate(d.getDate()-idx);
 let t=0;let list="";
 for(let i=0;i<7;i++){
  let x=new Date(mon);x.setDate(mon.getDate()+i);
  let ds=x.toISOString().split('T')[0];
  let v=calcDay(ds);
  t+=v;
  list+=`${ds}: ${fmt(v)}\n`;
 }
 weekListDiv.innerText=list;
 return t
}

function getStatus(l){
 if(!l.length)return"Keine Aktivität";
 let last=l[l.length-1].type;
 if(last==='Start')return"Arbeit läuft";
 if(last==='Pause Start')return"Pause aktiv";
 if(last==='Pause Ende')return"Arbeit läuft";
 if(last==='Ende')return"Beendet";
 return"-"
}

function liveTime(){
 let d=getDay();let total=0;
 if(!data[d])return 0;
 Object.values(data[d]).forEach(l=>{
  let s=null,p=0,ps=null;
  l.forEach(x=>{
   let tm=parseHM(x.time);
   if(x.type==='Start')s=tm;
   if(x.type==='Pause Start')ps=tm;
   if(x.type==='Pause Ende'&&ps!=null){p+=tm-ps;ps=null}
  });
  if(s!=null){
   let now=parseHM(nowHM());
   total+=Math.max(0,now-s-p);
  }
 });
 return total;
}

function render(){
 let d=getDay();branchesDiv.innerHTML="";
 dayTotalDiv.innerText="Heute: "+fmt(calcDay(d));
 weekTotalDiv.innerText="Woche: "+fmt(calcWeek());

 let live=liveTime();
 liveDiv.innerText=live>0?"Aktuell: "+fmt(live):"";

 if(!data[d])return;

 Object.keys(data[d]).forEach(b=>{
  let card=document.createElement("div");card.className="card";
  let logs=data[d][b];

  let title=document.createElement("div");title.innerHTML=`<b>${b}</b>`;card.appendChild(title);

  let st=document.createElement("div");st.className="status";
  let s=getStatus(logs);
  st.innerText=s;
  if(s.includes("läuft"))st.classList.add("running");
  else if(s.includes("Pause"))st.classList.add("pause");
  else st.classList.add("done");
  card.appendChild(st);

  let row=document.createElement("div");row.className="row";
  ['Start','Pause Start','Pause Ende','Ende'].forEach(t=>{
   let btn=document.createElement("button");btn.innerText=t;btn.onclick=()=>addLog(b,t);
   row.appendChild(btn);
  });
  card.appendChild(row);

  let del=document.createElement("button");del.innerText="Filiale löschen";del.onclick=()=>deleteBranch(b);
  card.appendChild(del);

  if(!logs.length){
   let empty=document.createElement("div");empty.innerText="Keine Aktivität";
   card.appendChild(empty);
  }

  logs.forEach((l,i)=>{
   let div=document.createElement("div");div.className="log";
   div.innerHTML=`${l.type} - ${l.time}`;
   let act=document.createElement("div");
   let e=document.createElement("button");e.innerText="✏️";e.onclick=()=>editLog(b,i);
   let x=document.createElement("button");x.innerText="X";x.onclick=()=>deleteLog(b,i);
   act.appendChild(e);act.appendChild(x);
   div.appendChild(act);
   card.appendChild(div);
  });

  branchesDiv.appendChild(card);
 });
}

function editLog(b,i){
 let v=prompt("Zeit HH:MM",data[getDay()][b][i].time);
 if(!v||isNaN(parseHM(v)))return;
 data[getDay()][b][i].time=v;
 sortLogs(data[getDay()][b]);
 save();render();
}

// reset day
document.getElementById("resetDay").onclick=function(){
 if(!confirm("Tag wirklich löschen?"))return;
 delete data[getDay()];
 save();render();
}

// live update
setInterval(render,60000);

dateInput.onchange=render;
render();
</script>
</body>
</html>
