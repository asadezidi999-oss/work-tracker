<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Arbeitszeit Tracker PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; background:#1e1e1e; color:white; margin:0; }
.container { max-width:500px; margin:auto; padding:15px; }

h2 { text-align:center; }

input, select {
  width:100%;
  padding:12px;
  margin-top:6px;
  border-radius:8px;
}

button {
  padding:12px;
  margin-top:5px;
  border-radius:10px;
  border:none;
}

.start{background:green;color:white;}
.pause{background:orange;color:white;}
.resume{background:teal;color:white;}
.end{background:red;color:white;}

.card {
  background:#2a2a2a;
  padding:15px;
  margin-top:10px;
  border-radius:10px;
}

.totalBox {
  background:#111;
  padding:10px;
  margin-bottom:10px;
  border-radius:10px;
}

.login { text-align:center; margin-top:100px; }
</style>

</head>

<body>

<div class="container">

<div id="login" class="login">
<h2>Login</h2>
<input type="password" id="pass">
<button onclick="checkPass()">Login</button>
</div>

<div id="app" style="display:none">

<h2>Arbeitszeit Tracker</h2>

<div class="totalBox" id="totals"></div>

<select id="monthSelect" onchange="changeMonth()"></select>

<input type="date" id="date">
<input id="input" placeholder="Filiale">
<button onclick="add()">➕</button>

<div id="list"></div>

</div>

</div>

<script>

let PASSWORD="1234";

function checkPass(){
  if(document.getElementById("pass").value===PASSWORD){
    login.style.display="none";
    app.style.display="block";
  }
}

let allData=JSON.parse(localStorage.getItem("allData"))||{};
let currentMonth=new Date().toISOString().slice(0,7);

if(!allData[currentMonth]) allData[currentMonth]={};
let data=allData[currentMonth];

function save(){
  allData[currentMonth]=data;
  localStorage.setItem("allData",JSON.stringify(allData));
}

function loadMonths(){
  let s=monthSelect;
  s.innerHTML="";
  for(let m in allData){
    let o=document.createElement("option");
    o.value=m;
    o.text=m;
    if(m===currentMonth) o.selected=true;
    s.appendChild(o);
  }
}

function changeMonth(){
  currentMonth=monthSelect.value;
  if(!allData[currentMonth]) allData[currentMonth]={};
  data=allData[currentMonth];
  render();
}

function add(){
  let v=input.value;
  if(!v) return;
  if(!data[v]) data[v]=[];
  input.value="";
  save(); render();
}

function log(b,t){
  let now=new Date();
  let d=date.value;
  if(d){
    let dd=new Date(d);
    dd.setHours(now.getHours(),now.getMinutes());
    now=dd;
  }
  data[b].push({type:t,time:now});
  save(); render();
}

function editTime(b,i,input){
  let val=input.value;
  if(val.length<5) return;

  let d=new Date(data[b][i].time);
  let [h,m]=val.split(":");

  d.setHours(h);
  d.setMinutes(m);

  data[b][i].time=d;
  save();
}

function deleteBranch(b){
  if(confirm("Filiale löschen?")){
    delete data[b];
    save(); render();
  }
}

function del(b,i){
  data[b].splice(i,1);
  save(); render();
}

function calc(logs){
  let total=0,start=null,pause=0,pStart=null;

  logs.forEach(l=>{
    let t=new Date(l.time);

    if(l.type==="Start") start=t;
    if(l.type==="Pause Start") pStart=t;

    if(l.type==="Pause Ende" && pStart){
      pause+=t-pStart;
      pStart=null;
    }

    if(l.type==="Ende" && start){
      total+=t-start-pause;
      start=null;
      pause=0;
    }
  });

  return total;
}

function format(d){
  let dt=new Date(d);
  return dt.toLocaleDateString()+" "+dt.toLocaleTimeString().slice(0,5);
}

// 🔥 حسابات متقدمة
function calculateTotals(){

  let day=0,week=0,month=0;
  let today=new Date();
  let weekStart=new Date();
  weekStart.setDate(today.getDate()-7);

  for(let b in data){
    let logs=data[b];
    let t=calc(logs);
    month+=t;

    logs.forEach(l=>{
      let d=new Date(l.time);

      if(d.toDateString()===today.toDateString()){
        day+=t;
      }

      if(d>weekStart){
        week+=t;
      }
    });
  }

  totals.innerHTML=`
  📅 Tag: ${(day/1000/60/60).toFixed(2)} h <br>
  📆 Woche: ${(week/1000/60/60).toFixed(2)} h <br>
  🗓️ Monat: ${(month/1000/60/60).toFixed(2)} h
  `;
}

function render(){

  list.innerHTML="";

  for(let b in data){

    let logs="";
    data[b].forEach((l,i)=>{
      logs+=`
      ${l.type} - ${format(l.time)}
      <input value="${new Date(l.time).toTimeString().slice(0,5)}"
      oninput="editTime('${b}',${i},this)">
      <button onclick="del('${b}',${i})">❌</button><br>`;
    });

    list.innerHTML+=`
    <div class="card">
    <b>${b}</b>
    <button onclick="deleteBranch('${b}')">🗑️</button><br>

    <button class="start" onclick="log('${b}','Start')">Start</button>
    <button class="pause" onclick="log('${b}','Pause Start')">Pause</button>
    <button class="resume" onclick="log('${b}','Pause Ende')">Weiter</button>
    <button class="end" onclick="log('${b}','Ende')">Ende</button>

    ${logs}
    </div>`;
  }

  calculateTotals();
  loadMonths();
}

render();

</script>

</body>
</html>
