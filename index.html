<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work Tracker PRO</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial}
body{height:100vh;background:#111;display:flex;justify-content:center;align-items:center;color:white}
.container{width:90%;max-width:420px;background:rgba(255,255,255,0.1);padding:20px;border-radius:20px;backdrop-filter:blur(10px)}
h1{text-align:center;margin-bottom:10px}
input,select,button{width:100%;padding:12px;margin-top:10px;border-radius:10px;border:none}
button{background:#00c6ff;color:white;font-weight:bold}
.entry{background:rgba(255,255,255,0.1);padding:10px;margin-top:10px;border-radius:10px}
.total{text-align:center;margin-top:10px;font-weight:bold}
</style>
</head>

<body>
<div class="container">
<h1>Work Tracker</h1>

<input type="text" id="branchInput" placeholder="Filiale">
<button onclick="addBranch()">Filiale hinzufügen</button>
<select id="branch"></select>

<button onclick="startWork()">Start Arbeit</button>
<button onclick="endWork()">Ende Arbeit</button>

<button onclick="startPause()">Pause Start</button>
<button onclick="endPause()">Pause Ende</button>

<div id="list"></div>
<div class="total" id="total">Gesamt: 0 h</div>
</div>

<script>
let entries = JSON.parse(localStorage.getItem("entries")||"[]");
let branches = JSON.parse(localStorage.getItem("branches")||"[]");

let startTime = null;
let pauseStart = null;
let totalPause = 0;

function save(){
 localStorage.setItem("entries",JSON.stringify(entries));
 localStorage.setItem("branches",JSON.stringify(branches));
}

function addBranch(){
 const val=document.getElementById("branchInput").value.trim();
 if(!val) return;
 branches.push(val);
 document.getElementById("branchInput").value="";
 save();
 renderBranches();
}

function renderBranches(){
 const sel=document.getElementById("branch");
 sel.innerHTML="";
 branches.forEach(b=>{
  const opt=document.createElement("option");
  opt.value=b; opt.textContent=b;
  sel.appendChild(opt);
 });
}

function startWork(){
 startTime = new Date();
 totalPause = 0;
 alert("Arbeit gestartet");
}

function endWork(){
 if(!startTime) return alert("Nicht gestartet!");
 const end = new Date();
 let diff = (end - startTime)/1000/60 - totalPause;

 const branch=document.getElementById("branch").value;
 const date=new Date().toISOString().split('T')[0];

 entries.push({branch,date,minutes:diff});
 startTime=null;
 totalPause=0;
 save();
 render();
}

function startPause(){
 if(!startTime) return alert("Start zuerst!");
 pauseStart = new Date();
}

function endPause(){
 if(!pauseStart) return;
 const now = new Date();
 totalPause += (now - pauseStart)/1000/60;
 pauseStart=null;
}

function deleteEntry(i){
 entries.splice(i,1);
 save();
 render();
}

function render(){
 const list=document.getElementById("list");
 list.innerHTML="";
 let total=0;

 entries.forEach((e,i)=>{
  total+=e.minutes;
  const div=document.createElement("div");
  div.className="entry";
  div.innerHTML=`
   <b>${e.branch}</b><br>
   ${e.date}<br>
   <b>${(e.minutes/60).toFixed(2)} h</b>
   <button onclick="deleteEntry(${i})">X</button>
  `;
  list.appendChild(div);
 });

 document.getElementById("total").innerText=
  "Gesamt: "+(total/60).toFixed(2)+" h";
}

renderBranches();
render();
</script>

</body>
</html>
