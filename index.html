<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arbeitszeit Tracker PRO</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial}
body{background:#f0f2f5;padding:10px}
.container{max-width:500px;margin:auto;background:#fff;padding:15px;border-radius:12px;box-shadow:0 5px 15px rgba(0,0,0,0.1)}
h1{text-align:center;margin-bottom:10px}
input,button{width:100%;padding:10px;margin-top:10px;border-radius:8px;border:1px solid #ccc;font-size:16px}
button{background:#007bff;color:white;border:none;cursor:pointer}
button:hover{background:#0056b3}
.entry{background:#f9f9f9;padding:10px;margin-top:10px;border-radius:8px}
.total{margin-top:15px;font-weight:bold;text-align:center}
</style>
</head>

<body>
<div class="container">
<h1>Arbeitszeit Tracker</h1>

<label>Datum</label>
<input type="date" id="date">

<label>Startzeit</label>
<input type="time" id="start">

<label>Endzeit</label>
<input type="time" id="end">

<label>Pause (Minuten)</label>
<input type="number" id="break" value="0">

<button onclick="addEntry()">Speichern</button>

<div id="list"></div>

<div class="total" id="total">Gesamt: 0 Stunden</div>
</div>

<script>
let entries = JSON.parse(localStorage.getItem("entries") || "[]");

function addEntry(){
  const date = document.getElementById("date").value;
  const start = document.getElementById("start").value;
  const end = document.getElementById("end").value;
  const br = parseInt(document.getElementById("break").value) || 0;

  if(!date || !start || !end){
    alert("Bitte alles ausfüllen!");
    return;
  }

  const startTime = new Date(`1970-01-01T${start}:00`);
  const endTime = new Date(`1970-01-01T${end}:00`);

  let diff = (endTime - startTime) / 1000 / 60; // minutes
  diff -= br;

  if(diff < 0){
    alert("Endzeit ist falsch!");
    return;
  }

  entries.push({date, start, end, break: br, minutes: diff});
  localStorage.setItem("entries", JSON.stringify(entries));

  render();
}

function deleteEntry(index){
  entries.splice(index,1);
  localStorage.setItem("entries", JSON.stringify(entries));
  render();
}

function render(){
  const list = document.getElementById("list");
  list.innerHTML = "";

  let total = 0;

  entries.forEach((e,i)=>{
    total += e.minutes;

    const div = document.createElement("div");
    div.className = "entry";
    div.innerHTML = `
      <b>${e.date}</b><br>
      ${e.start} - ${e.end} | Pause: ${e.break} min<br>
      <b>${(e.minutes/60).toFixed(2)} h</b>
      <button onclick="deleteEntry(${i})">Löschen</button>
    `;
    list.appendChild(div);
  });

  document.getElementById("total").innerText =
    "Gesamt: " + (total/60).toFixed(2) + " Stunden";
}

render();
</script>

</body>
</html>
