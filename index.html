<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Arbeitszeit Tracker PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {font-family:Arial;background:#1e1e1e;color:white;margin:0;}
.container{max-width:600px;margin:auto;padding:15px;}

input,button{
width:100%;
padding:12px;
margin-top:6px;
border-radius:8px;
}

button{border:none;}

.card{
background:#2a2a2a;
padding:10px;
margin-top:10px;
border-radius:10px;
}

.total{
background:#111;
padding:10px;
margin-bottom:10px;
border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>Arbeitszeit Tracker</h2>

<input type="date" id="date">

<input id="filialeInput" placeholder="Filiale">
<button onclick="addFiliale()">➕ Hinzufügen</button>

<div id="totals" class="total"></div>

<div id="list"></div>

</div>

<script>

// 📦 Daten
let data = JSON.parse(localStorage.getItem("data")) || {};

function save(){
  localStorage.setItem("data", JSON.stringify(data));
}

// ➕ Filiale (FIXED 🔥)
function addFiliale(){
  let input = document.getElementById("filialeInput");
  let name = input.value.trim();

  if(!name){
    alert("Bitte Filiale eingeben");
    return;
  }

  if(!data[name]){
    data[name] = [];
  }

  input.value="";
  save();
  render();
}

// ⏱️ Log
function log(branch,type){

  let selected = document.getElementById("date").value;

  if(!selected){
    alert("Bitte Datum wählen");
    return;
  }

  let now = new Date();
  let d = new Date(selected);

  d.setHours(now.getHours(), now.getMinutes());
  now = d;

  data[branch].push({
    type:type,
    time:now
  });

  save();
  render();
}

// ❌ löschen
function del(branch,i){
  data[branch].splice(i,1);
  save();
  render();
}

// 🗑️ ganze Filiale löschen
function deleteBranch(branch){
  if(confirm("Filiale löschen?")){
    delete data[branch];
    save();
    render();
  }
}

// 🧮 Berechnung
function calcDay(logs, selected){

  let total=0, start=null, pause=0, pStart=null;

  logs.forEach(l=>{
    let t=new Date(l.time);

    if(t.toDateString() !== new Date(selected).toDateString()) return;

    if(l.type==="Start") start=t;
    if(l.type==="Pause Start") pStart=t;

    if(l.type==="Pause Ende" && pStart){
      pause += t - pStart;
      pStart=null;
    }

    if(l.type==="Ende" && start){
      total += t - start - pause;
      start=null;
      pause=0;
    }
  });

  return total;
}

// 📊 Totals
function updateTotals(selected){

  let day=0;

  for(let b in data){
    day += calcDay(data[b], selected);
  }

  document.getElementById("totals").innerHTML =
    "📅 Tag: " + (day/3600000).toFixed(2) + " h";
}

// 🖥️ Render
function render(){

  let selected = document.getElementById("date").value;
  let list = document.getElementById("list");

  list.innerHTML="";

  if(!selected){
    list.innerHTML="Bitte Datum wählen";
    return;
  }

  for(let b in data){

    let htmlLogs="";

    data[b].forEach((l,i)=>{
      let t=new Date(l.time);

      if(t.toDateString() !== new Date(selected).toDateString()) return;

      htmlLogs += `
      ${l.type} - ${t.toLocaleTimeString()}
      <button onclick="del('${b}',${i})">❌</button><br>`;
    });

    list.innerHTML += `
    <div class="card">
      <b>${b}</b>
      <button onclick="deleteBranch('${b}')">🗑️</button><br>

      <button onclick="log('${b}','Start')">Start</button>
      <button onclick="log('${b}','Pause Start')">Pause</button>
      <button onclick="log('${b}','Pause Ende')">Weiter</button>
      <button onclick="log('${b}','Ende')">Ende</button>

      ${htmlLogs}
    </div>`;
  }

  updateTotals(selected);
}

// 📅 default heute
document.getElementById("date").value =
  new Date().toISOString().split("T")[0];

render();

</script>

</body>
</html>
