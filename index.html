<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work Tracker PRO</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial}
body{background:#0f172a;color:white;display:flex;justify-content:center;align-items:center;height:100vh}
.container{width:95%;max-width:450px;background:#1e293b;padding:20px;border-radius:20px}
h1{text-align:center;margin-bottom:10px}
button,input,select{width:100%;padding:12px;margin-top:10px;border-radius:10px;border:none}
button{background:#38bdf8;color:black;font-weight:bold}
.timer{text-align:center;font-size:28px;margin-top:10px}
.entry{background:#334155;padding:10px;margin-top:10px;border-radius:10px}
.total{text-align:center;margin-top:10px;font-weight:bold}
</style>
</head>

<body>
<div class="container">
<h1>Work Tracker</h1>

<input type="text" id="branchInput" placeholder="Filiale hinzufügen">
<button onclick="addBranch()">Filiale hinzufügen</button>
<select id="branch"></select>

<div class="timer" id="timer">00:00:00</div>

<button onclick="startWork()">Start</button>
<button onclick="endWork()">Ende</button>
<button onclick="startPause()">Pause Start</button>
<button onclick="endPause()">Pause Ende</button>

<div id="stats"></div>
<div id="list"></div>
<div class="total" id="total">Gesamt: 0 h</div>
</div>

<script>
let entries = JSON.parse(localStorage.getItem("entries")||"[]");
let branches = JSON.parse(localStorage.getItem("branches")||"[]");

let startTime=null, pauseStart=null, totalPause=0, timerInterval=null;

function save(){
 localStorage.setItem("entries",JSON.stringify(entries));
 localStorage.setItem("branches",JSON.stringify(branches));
}

function addBranch(){
 const val=document.getElementById("branchInput").value.trim();
 if(!val) return;
 branches.push(val);
 document.getElementById("branchInput").value="";
 save(); renderBranches();
}

function renderBranches(){
 const sel=document.getElementById("branch");
 sel.innerHTML="";
 if(branches.length===0){
  sel.style.display="none";
  return;
 }
 sel.style.display="block";
 branches.forEach(b=>{
  const o=document.createElement("option"); o.value=b;o.textContent=b; sel.appendChild(o);
 });
}

function updateTimer(){
 if(!startTime) return;
 const now=new Date();
 let diff=(now-startTime)/1000-totalPause*60;
 const h=Math.floor(diff/3600);
 const m=Math.floor((diff%3600)/60);
 const s=Math.floor(diff%60);
 document.getElementById("timer").innerText=
  `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function startWork(){
 startTime=new Date(); totalPause=0; pauseStart=null;
 clearInterval(timerInterval);
 timerInterval=setInterval(updateTimer,1000);
}

function endWork(){
 if(!startTime) return alert("Du hast noch nicht gestartet!");
 if(pauseStart){
  endPause();
 }
 clearInterval(timerInterval);
 const end=new Date();
 let diff=(end-startTime)/1000/60-totalPause;
 const branch=document.getElementById("branch").value||"-";
 const date=new Date().toISOString().split('T')[0];
 entries.push({branch,date,minutes:diff});
 startTime=null; totalPause=0; pauseStart=null;
 save(); render();
}

function startPause(){
 if(!startTime) return alert("Starte zuerst die Arbeit!");
 if(pauseStart) return alert("Pause läuft schon!");
 pauseStart=new Date();
}

function endPause(){
 if(!pauseStart) return alert("Keine Pause aktiv!");
 const now=new Date();
 totalPause+=(now-pauseStart)/1000/60;
 pauseStart=null;
}

// Reminder
setInterval(()=>{
 if(startTime && Notification.permission==='granted'){
  new Notification("Vergiss nicht zu stoppen!");
 }
},7200000);

function render(){
 const list=document.getElementById("list"); list.innerHTML="";
 let total=0;

 entries.forEach((e,i)=>{
  total+=e.minutes;
  const d=document.createElement("div");
  d.className="entry";
  d.innerHTML=`${e.branch}<br>${e.date}<br>${(e.minutes/60).toFixed(2)} h`;
  list.appendChild(d);
 });

 document.getElementById("total").innerText="Gesamt: "+(total/60).toFixed(2)+" h";
 renderStats();
}

function renderStats(){
 let today=0, month=0;
 const now=new Date();
 entries.forEach(e=>{
  const d=new Date(e.date);
  if(d.toDateString()===now.toDateString()) today+=e.minutes;
  if(d.getMonth()===now.getMonth()) month+=e.minutes;
 });
 document.getElementById("stats").innerHTML=
  `Heute: ${(today/60).toFixed(2)} h<br>Monat: ${(month/60).toFixed(2)} h`;
}

renderBranches(); render();
</script>

</body>
</html>
