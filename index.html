<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Arbeitszeit Tracker PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; background:#1e1e1e; color:white; margin:0; }
.container { max-width:500px; margin:auto; padding:15px; }

input, select {
  width:100%;
  padding:12px;
  margin-top:6px;
  border-radius:8px;
}

button {
  padding:12px;
  margin-top:5px;
  border-radius:10px;
  border:none;
}

.start{background:green;color:white;}
.pause{background:orange;color:white;}
.resume{background:teal;color:white;}
.end{background:red;color:white;}

.card {
  background:#2a2a2a;
  padding:15px;
  margin-top:10px;
  border-radius:10px;
}

.total {color:#4da3ff;font-weight:bold;}
</style>

</head>

<body>

<div class="container">

<h2>Arbeitszeit Tracker</h2>

<input type="date" id="date">
<input id="input" placeholder="Filiale">
<button onclick="add()">➕</button>

<div id="list"></div>

</div>

<script>

let data = JSON.parse(localStorage.getItem("data")) || {};

function save(){
  localStorage.setItem("data",JSON.stringify(data));
}

function add(){
  let v=document.getElementById("input").value;
  if(!v) return;
  if(!data[v]) data[v]=[];
  document.getElementById("input").value="";
  save(); render();
}

function log(b,t){
  let now=new Date();
  let d=document.getElementById("date").value;

  if(d){
    let dd=new Date(d);
    dd.setHours(now.getHours(),now.getMinutes());
    now=dd;
  }

  data[b].push({type:t,time:now});
  save(); render();
}

// 🔥 تعديل الوقت بدون تخريب
function editTime(b,i,input){
  let val=input.value;
  if(val.length<5) return; // يمنع التخريب

  let d=new Date(data[b][i].time);
  let [h,m]=val.split(":");

  d.setHours(parseInt(h));
  d.setMinutes(parseInt(m));

  data[b][i].time=d;
  save();
}

// 🧮 الحساب
function calc(logs){
  let total=0,start=null,pause=0,pStart=null;

  logs.forEach(l=>{
    let t=new Date(l.time);

    if(l.type==="Start") start=t;
    if(l.type==="Pause Start") pStart=t;

    if(l.type==="Pause Ende" && pStart){
      pause+=t-pStart;
      pStart=null;
    }

    if(l.type==="Ende" && start){
      total+=t-start-pause;
      start=null;
      pause=0;
    }
  });

  return (total/1000/60/60).toFixed(2);
}

// 🔥 عرض تاريخ + وقت مرتب
function formatDate(d){
  let dt=new Date(d);
  return dt.toLocaleDateString()+" - "+dt.toLocaleTimeString().slice(0,5);
}

// 🖥️
function render(){
  let list=document.getElementById("list");
  list.innerHTML="";

  for(let b in data){

    let logs="";
    data[b].forEach((l,i)=>{

      let time=new Date(l.time).toTimeString().slice(0,5);

      logs+=`
      ${l.type} - ${formatDate(l.time)}
      <input value="${time}" 
      oninput="editTime('${b}',${i},this)">
      <button onclick="del('${b}',${i})">❌</button><br>`;
    });

    list.innerHTML+=`
    <div class="card">
      <b>${b}</b><br>

      <button class="start" onclick="log('${b}','Start')">Start</button>
      <button class="pause" onclick="log('${b}','Pause Start')">Pause</button>
      <button class="resume" onclick="log('${b}','Pause Ende')">Weiter</button>
      <button class="end" onclick="log('${b}','Ende')">Ende</button>

      ${logs}

      <div class="total">Gesamt: ${calc(data[b])} h</div>
    </div>`;
  }
}

function del(b,i){
  data[b].splice(i,1);
  save(); render();
}

render();

</script>

</body>
</html>Gesamt: 0.02 h
