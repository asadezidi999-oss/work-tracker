<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Arbeitszeit Tracker PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {font-family:Arial;background:#1e1e1e;color:white;margin:0;}
.container{max-width:600px;margin:auto;padding:15px;}

input,button{
width:100%;
padding:12px;
margin-top:6px;
border-radius:8px;
}

button{border:none;}

.card{
background:#2a2a2a;
padding:10px;
margin-top:10px;
border-radius:10px;
}

.top{
background:#111;
padding:10px;
margin-bottom:10px;
border-radius:10px;
}

canvas{
background:white;
border-radius:10px;
margin-top:10px;
}
</style>

</head>

<body>

<div class="container">

<h2>Arbeitszeit Tracker</h2>

<input type="date" id="date">

<input id="input" placeholder="Filiale">
<button onclick="add()">➕ Hinzufügen</button>
<button onclick="exportPDF()">📤 PDF</button>

<div id="totals" class="top"></div>

<canvas id="chart"></canvas>

<div id="list"></div>

</div>

<script>

let data = JSON.parse(localStorage.getItem("data")) || {};

function save(){
  localStorage.setItem("data",JSON.stringify(data));
}

// ➕ Filiale
function add(){
  let v=input.value.trim();
  if(!v) return;
  if(!data[v]) data[v]=[];
  input.value="";
  save(); render();
}

// ⏱️ تسجيل
function log(b,t){

  let d=date.value;
  if(!d){ alert("Datum wählen"); return; }

  let now=new Date(d);
  let c=new Date();

  now.setHours(c.getHours(),c.getMinutes());

  data[b].push({type:t,time:now});
  save(); render();
}

// ❌ حذف
function del(b,i){
  data[b].splice(i,1);
  save(); render();
}

// 🗑️ حذف فرع
function deleteBranch(b){
  if(confirm("Filiale löschen?")){
    delete data[b];
    save(); render();
  }
}

// ✏️ تعديل وقت
function editTime(b,i,input){

  if(input.value.length<5) return;

  let d=new Date(data[b][i].time);
  let [h,m]=input.value.split(":");

  d.setHours(h);
  d.setMinutes(m);

  data[b][i].time=d;
  save();
}

// 🧮 حساب الفترات
function calcPeriods(logs){

  let result=[];
  let start=null,pause=0,pStart=null;

  logs.forEach(l=>{
    let t=new Date(l.time);

    if(l.type==="Start") start=t;
    if(l.type==="Pause Start") pStart=t;

    if(l.type==="Pause Ende" && pStart){
      pause+=t-pStart;
      pStart=null;
    }

    if(l.type==="Ende" && start){
      result.push({date:start,work:t-start-pause});
      start=null;
      pause=0;
    }
  });

  return result;
}

// 📊 حسابات
function calculateTotals(){

  let selected=new Date(date.value);
  let today=selected;
  let weekStart=new Date(selected);
  weekStart.setDate(weekStart.getDate()-7);

  let day=0,week=0,month=0;

  for(let b in data){

    let periods=calcPeriods(data[b]);

    periods.forEach(p=>{

      let d=new Date(p.date);

      if(d.toDateString()===today.toDateString())
        day+=p.work;

      if(d>weekStart)
        week+=p.work;

      if(d.getMonth()===today.getMonth())
        month+=p.work;
    });
  }

  totals.innerHTML=`
  📅 Tag: ${(day/3600000).toFixed(2)} h<br>
  📆 Woche: ${(week/3600000).toFixed(2)} h<br>
  🗓️ Monat: ${(month/3600000).toFixed(2)} h`;
}

// 📈 رسم بياني
function drawChart(){

  let days={};

  for(let b in data){

    let periods=calcPeriods(data[b]);

    periods.forEach(p=>{
      let d=new Date(p.date).toLocaleDateString();
      if(!days[d]) days[d]=0;
      days[d]+=p.work;
    });
  }

  let labels=Object.keys(days);
  let values=labels.map(d=>(days[d]/3600000).toFixed(2));

  new Chart(chart,{
    type:'bar',
    data:{
      labels:labels,
      datasets:[{label:'Stunden',data:values}]
    }
  });
}

// 🖥️ عرض
function render(){

  let selected=date.value;

  list.innerHTML="";

  if(!selected){
    list.innerHTML="Bitte Datum wählen";
    return;
  }

  for(let b in data){

    let logs="";
    data[b].forEach((l,i)=>{

      let t=new Date(l.time);

      if(t.toDateString() !== new Date(selected).toDateString()) return;

      logs+=`
      ${l.type} - ${t.toLocaleTimeString()}
      <input value="${t.toTimeString().slice(0,5)}"
      oninput="editTime('${b}',${i},this)">
      <button onclick="del('${b}',${i})">❌</button><br>`;
    });

    if(logs){

      list.innerHTML+=`
      <div class="card">
      <b>${b}</b>
      <button onclick="deleteBranch('${b}')">🗑️</button><br>

      <button onclick="log('${b}','Start')">Start</button>
      <button onclick="log('${b}','Pause Start')">Pause</button>
      <button onclick="log('${b}','Pause Ende')">Weiter</button>
      <button onclick="log('${b}','Ende')">Ende</button>

      ${logs}
      </div>`;
    }
  }

  calculateTotals();
  drawChart();
}

// 📤 PDF
function exportPDF(){

  if(!date.value){ alert("Datum wählen"); return; }

  const {jsPDF}=window.jspdf;
  let doc=new jsPDF();
  let y=10;

  doc.text("Tagesbericht "+date.value,10,y); y+=10;

  for(let b in data){

    let periods=calcPeriods(data[b]);

    periods.forEach(p=>{
      if(new Date(p.date).toDateString()===new Date(date.value).toDateString()){
        doc.text(b+" "+(p.work/3600000).toFixed(2)+" h",10,y);
        y+=6;
      }
    });
  }

  doc.save("report.pdf");
}

date.value=new Date().toISOString().split("T")[0];

render();

</script>

</body>
</html>
