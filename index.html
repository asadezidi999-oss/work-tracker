<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work Tracker PRO</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial}

body{
  height:100vh;
  background:url('https://images.unsplash.com/photo-1504754524776-8f4f37790ca0') no-repeat center/cover;
  display:flex;
  justify-content:center;
  align-items:center;
}

.overlay{
  position:absolute;
  width:100%;
  height:100%;
  backdrop-filter:blur(8px);
  background:rgba(0,0,0,0.4);
}

.container{
  position:relative;
  width:90%;
  max-width:420px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(15px);
  padding:20px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  color:white;
}

h1{text-align:center;margin-bottom:15px}

input,select,button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
  font-size:15px;
}

input,select{
  background:rgba(255,255,255,0.2);
  color:white;
}

button{
  background:#00c6ff;
  color:white;
  font-weight:bold;
}

.entry{
  background:rgba(255,255,255,0.15);
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}

.total{text-align:center;margin-top:10px;font-weight:bold}
</style>
</head>

<body>
<div class="overlay"></div>

<div class="container">
<h1>Work Tracker</h1>

<input type="text" id="branchInput" placeholder="Neue Filiale...">
<button onclick="addBranch()">Filiale hinzufügen</button>

<select id="branch"></select>
<input type="date" id="date">
<input type="time" id="start">
<input type="time" id="end">
<input type="number" id="break" placeholder="Pause (Minuten)">

<button onclick="addEntry()">Speichern</button>

<div id="list"></div>
<div class="total" id="total">Gesamt: 0 h</div>
</div>

<script>
let entries = JSON.parse(localStorage.getItem("entries")||"[]");
let branches = JSON.parse(localStorage.getItem("branches")||"[]");

function save(){
 localStorage.setItem("entries",JSON.stringify(entries));
 localStorage.setItem("branches",JSON.stringify(branches));
}

function addBranch(){
 const val=document.getElementById("branchInput").value.trim();
 if(!val) return;
 branches.push(val);
 document.getElementById("branchInput").value="";
 save();
 renderBranches();
}

function renderBranches(){
 const sel=document.getElementById("branch");
 sel.innerHTML="";
 branches.forEach(b=>{
  const opt=document.createElement("option");
  opt.value=b; opt.textContent=b;
  sel.appendChild(opt);
 });
}

function addEntry(){
 const branch=document.getElementById("branch").value;
 const date=document.getElementById("date").value;
 const start=document.getElementById("start").value;
 const end=document.getElementById("end").value;
 const br=parseInt(document.getElementById("break").value)||0;

 if(!date||!start||!end) return alert("Bitte alles ausfüllen");

 const s=new Date(`1970-01-01T${start}:00`);
 const e=new Date(`1970-01-01T${end}:00`);
 let diff=(e-s)/1000/60 - br;
 if(diff<0) return alert("Fehler bei Zeit");

 entries.push({branch,date,start,end,break:br,minutes:diff});
 save();
 render();
}

function deleteEntry(i){
 entries.splice(i,1);
 save();
 render();
}

function render(){
 const list=document.getElementById("list");
 list.innerHTML="";
 let total=0;

 entries.forEach((e,i)=>{
  total+=e.minutes;
  const div=document.createElement("div");
  div.className="entry";
  div.innerHTML=`
   <b>${e.branch}</b><br>
   ${e.date}<br>
   ${e.start} - ${e.end}<br>
   <b>${(e.minutes/60).toFixed(2)} h</b>
   <button onclick="deleteEntry(${i})">X</button>
  `;
  list.appendChild(div);
 });

 document.getElementById("total").innerText=
  "Gesamt: "+(total/60).toFixed(2)+" h";
}

renderBranches();
render();
</script>

</body>
</html>
