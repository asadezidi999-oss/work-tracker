<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Arbeitszeit PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {font-family:Arial;background:#1e1e1e;color:white;margin:0;}
.container{max-width:600px;margin:auto;padding:15px;}

input,button{
width:100%;padding:12px;margin-top:6px;border-radius:8px;
}

button{border:none;}

.card{
background:#2a2a2a;padding:10px;margin-top:10px;border-radius:10px;
}

.topbox{
background:#111;padding:10px;margin-bottom:10px;border-radius:10px;
}

.nav{
display:flex;gap:5px;
}
.nav button{flex:1;}

canvas{background:white;border-radius:10px;margin-top:10px;}
</style>

</head>

<body>

<div class="container">

<h2>Arbeitszeit PRO</h2>

<div class="nav">
<button onclick="changeDay(-1)">⬅️</button>
<input type="date" id="date">
<button onclick="changeDay(1)">➡️</button>
</div>

<input id="input" placeholder="Filiale">
<button onclick="add()">➕ Hinzufügen</button>
<button onclick="exportPDF()">📤 PDF</button>

<div id="totals" class="topbox"></div>

<canvas id="chart"></canvas>

<div id="list"></div>

</div>

<script>

let data=JSON.parse(localStorage.getItem("data"))||{};

function save(){
localStorage.setItem("data",JSON.stringify(data));
}

function add(){
if(!input.value)return;
if(!data[input.value])data[input.value]=[];
input.value="";
save();render();
}

function log(b,t){
let d=date.value;
if(!d){alert("Datum wählen");return;}

let now=new Date(d);
let c=new Date();
now.setHours(c.getHours(),c.getMinutes());

data[b].push({type:t,time:now});
save();render();
}

function del(b,i){
data[b].splice(i,1);
save();render();
}

function calcDay(logs,selected){
let total=0,start=null,pause=0,pStart=null;

logs.forEach(l=>{
let t=new Date(l.time);
if(t.toDateString()!=new Date(selected).toDateString())return;

if(l.type==="Start")start=t;
if(l.type==="Pause Start")pStart=t;

if(l.type==="Pause Ende"&&pStart){
pause+=t-pStart;pStart=null;
}

if(l.type==="Ende"&&start){
total+=t-start-pause;
start=null;pause=0;
}
});

return total;
}

function render(){

let selected=date.value;
if(!selected)return;

list.innerHTML="";
let totalDay=0;

for(let b in data){

let logs="";
data[b].forEach((l,i)=>{

let t=new Date(l.time);
if(t.toDateString()!=new Date(selected).toDateString())return;

logs+=`${l.type} - ${t.toLocaleTimeString()}
<button onclick="del('${b}',${i})">❌</button><br>`;
});

let total=calcDay(data[b],selected);
totalDay+=total;

if(logs){
list.innerHTML+=`
<div class="card">
<b>${b}</b><br>

<button onclick="log('${b}','Start')">Start</button>
<button onclick="log('${b}','Pause Start')">Pause</button>
<button onclick="log('${b}','Pause Ende')">Weiter</button>
<button onclick="log('${b}','Ende')">Ende</button>

${logs}

<b>${(total/3600000).toFixed(2)} h</b>
</div>`;
}
}

// أسبوع
let week=0;
let weekStart=new Date(selected);
weekStart.setDate(weekStart.getDate()-7);

for(let b in data){
data[b].forEach(l=>{
let t=new Date(l.time);
if(t>weekStart)week+=calcDay(data[b],t);
});
}

totals.innerHTML=`
📅 Tag: ${(totalDay/3600000).toFixed(2)} h<br>
📆 Woche: ${(week/3600000).toFixed(2)} h
`;

drawChart();
}

// 📊 Chart
function drawChart(){

let days={};

for(let b in data){
data[b].forEach(l=>{
let d=new Date(l.time).toLocaleDateString();
if(!days[d])days[d]=0;
});
}

let labels=Object.keys(days);
let values=[];

labels.forEach(d=>{
let sum=0;
for(let b in data){
sum+=calcDay(data[b],d);
}
values.push((sum/3600000).toFixed(2));
});

new Chart(chart,{
type:'bar',
data:{labels:labels,datasets:[{label:'Stunden',data:values}]}
});
}

// تغيير يوم
function changeDay(n){
let d=new Date(date.value||new Date());
d.setDate(d.getDate()+n);
date.value=d.toISOString().split("T")[0];
render();
}

// PDF
function exportPDF(){

const {jsPDF}=window.jspdf;
let doc=new jsPDF();
let y=10;

doc.text("Tagesbericht "+date.value,10,y);y+=10;

for(let b in data){
let t=calcDay(data[b],date.value);
if(t>0){
doc.text(b+" "+(t/3600000).toFixed(2)+" h",10,y);
y+=6;
}
}

doc.save("report.pdf");
}

date.value=new Date().toISOString().split("T")[0];
render();

</script>

</body>
</html>
