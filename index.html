<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arbeitszeit Tracker</title>

<style>
body {
  font-family: Arial;
  background: #121212;
  color: white;
  margin: 0;
  padding: 10px;
}
button {
  padding: 10px;
  margin: 5px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}
.card {
  background: #1e1e1e;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<h2>Arbeitszeit Tracker</h2>

<input type="date" id="date">

<button onclick="prevDay()">◀</button>
<button onclick="nextDay()">▶</button>

<h3 id="total"></h3>

<input id="filialName" placeholder="Filiale">
<button onclick="addFiliale()">Hinzufügen</button>

<div id="app"></div>

<script>
const STORAGE_KEY = "tracker";

function load() {
  return JSON.parse(localStorage.getItem(STORAGE_KEY)) || { filialen: [] };
}

function save(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function nowTime() {
  return new Date().toTimeString().slice(0,5);
}

function toMinutes(t) {
  let [h,m] = t.split(":").map(Number);
  return h*60+m;
}

// 🔥 Smart Fix (Mitternacht)
function diff(start, end) {
  if (end < start) end += 1440;
  return end - start;
}

function getSelectedDate() {
  return document.getElementById("date").value;
}

function prevDay() {
  let d = new Date(getSelectedDate());
  d.setDate(d.getDate() - 1);
  document.getElementById("date").value = d.toISOString().slice(0,10);
  render();
}

function nextDay() {
  let d = new Date(getSelectedDate());
  d.setDate(d.getDate() + 1);
  document.getElementById("date").value = d.toISOString().slice(0,10);
  render();
}

function addFiliale() {
  let data = load();
  let name = document.getElementById("filialName").value;

  data.filialen.push({
    id: Date.now(),
    name,
    days: {}
  });

  save(data);
  render();
}

function addLog(fid, type) {
  let data = load();
  let date = getSelectedDate();
  let f = data.filialen.find(f => f.id === fid);

  if (!f.days[date]) f.days[date] = { logs: [] };

  f.days[date].logs.push({
    id: Date.now(),
    type,
    time: nowTime(),
    min: toMinutes(nowTime())
  });

  save(data);
  render();
}

function calc(logs) {
  let start = logs.find(l => l.type === "start");
  let end = [...logs].reverse().find(l => l.type === "end");

  if (!start || !end) return 0;

  let total = diff(start.min, end.min);

  let pauses = 0;
  let ps = null;

  logs.forEach(l => {
    if (l.type === "pause_start") ps = l;
    if (l.type === "pause_end" && ps) {
      pauses += diff(ps.min, l.min);
      ps = null;
    }
  });

  return total - pauses;
}

function format(min) {
  let h = Math.floor(min/60);
  let m = min%60;
  return `${h}h ${m}min`;
}

// 🔥 Smart Fix Status
function getStatus(logs) {
  let hasEnd = logs.some(l => l.type === "end");
  let pause = logs.some(l => l.type === "pause_start") &&
              !logs.some(l => l.type === "pause_end");

  if (hasEnd) return "Beendet";
  if (pause) return "Pause";
  if (logs.some(l => l.type === "start")) return "Arbeit läuft";
  return "Keine Aktivität";
}

function render() {
  let data = load();
  let date = getSelectedDate();
  let app = document.getElementById("app");
  app.innerHTML = "";

  let totalDay = 0;

  data.filialen.forEach(f => {
    let logs = f.days[date]?.logs || [];

    // 🔥 Smart Fix Sortierung
    logs.sort((a,b) => a.min - b.min);

    let work = calc(logs);
    totalDay += work;

    let div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h3>${f.name}</h3>
      <p>Status: ${getStatus(logs)}</p>
      <p>${logs.length ? format(work) : "Keine Aktivität"}</p>

      <button onclick="addLog(${f.id},'start')">Start</button>
      <button onclick="addLog(${f.id},'pause_start')">Pause Start</button>
      <button onclick="addLog(${f.id},'pause_end')">Pause Ende</button>
      <button onclick="addLog(${f.id},'end')">Ende</button>

      <div>
        ${logs.map(l => `${l.type} - ${l.time}`).join("<br>")}
      </div>
    `;

    app.appendChild(div);
  });

  document.getElementById("total").innerText = "Heute: " + format(totalDay);
}

// init
document.getElementById("date").value = new Date().toISOString().slice(0,10);
render();

</script>
</body>
</html>
