<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arbeitszeit Pro</title>

<style>
body { font-family: Arial; background:#121212; color:#fff; padding:10px }
.card { background:#1e1e1e; padding:10px; margin:10px 0; border-radius:10px }
button { margin:3px; padding:8px; border:none; border-radius:6px; cursor:pointer }
input { padding:5px }
.green { color:#4caf50 }
.yellow { color:#ffeb3b }
.red { color:#f44336 }
</style>
</head>

<body>

<h2>Arbeitszeit Tracker</h2>

<input type="date" id="date">
<button onclick="changeDay(-1)">◀</button>
<button onclick="changeDay(1)">▶</button>

<h3 id="today"></h3>
<h3 id="week"></h3>

<input id="name" placeholder="Filiale">
<button onclick="addFiliale()">+</button>

<button onclick="exportJSON()">Export</button>
<input type="file" onchange="importJSON(event)">

<button onclick="resetDay()">Tag Reset</button>

<div id="app"></div>

<script>
const KEY="tracker_pro";

// ===== Storage =====
function load(){return JSON.parse(localStorage.getItem(KEY))||{filialen:[]}}
function save(d){localStorage.setItem(KEY,JSON.stringify(d))}

// ===== Utils =====
function now(){return new Date().toTimeString().slice(0,5)}
function toMin(t){let[a,b]=t.split(":");return a*60+ +b}
function diff(a,b){ if(b<a) b+=1440; return b-a } // Smart Fix midnight
function fmt(m){return Math.floor(m/60)+"h "+(m%60)+"min"}

// ===== Date =====
function getDate(){return document.getElementById("date").value}
function changeDay(x){
 let d=new Date(getDate()); d.setDate(d.getDate()+x)
 document.getElementById("date").value=d.toISOString().slice(0,10)
 render()
}

// ===== Filiale =====
function addFiliale(){
 let d=load()
 let n=document.getElementById("name").value
 if(!n) return
 d.filialen.push({id:Date.now(),name:n,days:{}})
 save(d); render()
}

// ===== Logs =====
function addLog(fid,type){
 let d=load(),date=getDate()
 let f=d.filialen.find(x=>x.id===fid)
 if(!f.days[date]) f.days[date]={logs:[]}

 let logs=f.days[date].logs

 // Anti double click
 if(logs.length && logs[logs.length-1].type===type) return

 logs.push({
   id:Date.now(),
   type,
   time:now(),
   min:toMin(now())
 })

 save(d); render()
}

// ===== Edit =====
function editTime(fid,lid,val){
 let d=load(),date=getDate()
 let f=d.filialen.find(x=>x.id===fid)
 let log=f.days[date].logs.find(l=>l.id===lid)
 log.time=val
 log.min=toMin(val)
 save(d); render()
}

// ===== Delete =====
function delLog(fid,lid){
 let d=load(),date=getDate()
 let f=d.filialen.find(x=>x.id===fid)
 f.days[date].logs=f.days[date].logs.filter(l=>l.id!==lid)
 save(d); render()
}

// ===== Calc =====
function calc(logs){
 let s=logs.find(l=>l.type==="start")
 let e=[...logs].reverse().find(l=>l.type==="end")
 if(!s||!e) return 0

 let total=diff(s.min,e.min)
 let pause=0,ps=null

 logs.forEach(l=>{
   if(l.type==="pause_start") ps=l
   if(l.type==="pause_end"&&ps){
     pause+=diff(ps.min,l.min)
     ps=null
   }
 })

 return total-pause
}

// ===== Status =====
function status(logs){
 let end=logs.some(l=>l.type==="end")
 let pause=logs.some(l=>l.type==="pause_start") &&
            !logs.some(l=>l.type==="pause_end")

 if(end) return ["Beendet","green"]
 if(pause) return ["Pause","yellow"]
 if(logs.some(l=>l.type==="start")) return ["Arbeit läuft","red"]
 return ["Keine Aktivität",""]
}

// ===== Week =====
function weekTotal(data){
 let base=new Date(getDate())
 let sum=0

 for(let i=0;i<7;i++){
   let d=new Date(base); d.setDate(base.getDate()-i)
   let day=d.toISOString().slice(0,10)

   data.filialen.forEach(f=>{
     let logs=f.days[day]?.logs||[]
     logs.sort((a,b)=>a.min-b.min)
     sum+=calc(logs)
   })
 }
 return sum
}

// ===== Export =====
function exportJSON(){
 let data=localStorage.getItem(KEY)
 let blob=new Blob([data],{type:"application/json"})
 let a=document.createElement("a")
 a.href=URL.createObjectURL(blob)
 a.download="data.json"
 a.click()
}

// ===== Import =====
function importJSON(e){
 let file=e.target.files[0]
 let reader=new FileReader()
 reader.onload=()=>{
   localStorage.setItem(KEY,reader.result)
   render()
 }
 reader.readAsText(file)
}

// ===== Reset =====
function resetDay(){
 if(!confirm("Sicher?")) return
 let d=load(),date=getDate()
 d.filialen.forEach(f=>{ if(f.days[date]) f.days[date].logs=[] })
 save(d); render()
}

// ===== Render =====
function render(){
 let data=load(),date=getDate()
 let app=document.getElementById("app")
 app.innerHTML=""
 let total=0

 data.filialen.forEach(f=>{
   let logs=f.days[date]?.logs||[]

   // Smart Fix sort
   logs.sort((a,b)=>a.min-b.min)

   let work=calc(logs)
   total+=work

   let [txt,color]=status(logs)

   let div=document.createElement("div")
   div.className="card"

   div.innerHTML=`
   <h3>${f.name}</h3>
   <p class="${color}">${txt}</p>
   <p>${logs.length?fmt(work):"Keine Aktivität"}</p>

   <button onclick="addLog(${f.id},'start')">Start</button>
   <button onclick="addLog(${f.id},'pause_start')">Pause</button>
   <button onclick="addLog(${f.id},'pause_end')">Weiter</button>
   <button onclick="addLog(${f.id},'end')">Ende</button>

   ${logs.map(l=>`
     <div>
       ${l.type}
       <input type="time" value="${l.time}" onchange="editTime(${f.id},${l.id},this.value)">
       <button onclick="delLog(${f.id},${l.id})">X</button>
     </div>
   `).join("")}
   `

   app.appendChild(div)
 })

 document.getElementById("today").innerText="Heute: "+fmt(total)
 document.getElementById("week").innerText="Woche: "+fmt(weekTotal(data))
}

// init
document.getElementById("date").value=new Date().toISOString().slice(0,10)
render()

</script>
</body>
</html>
