<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work Tracker PRO</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial}
body{background:#eef1f5;padding:15px}
.container{max-width:600px;margin:auto;background:#fff;padding:20px;border-radius:15px;box-shadow:0 10px 25px rgba(0,0,0,0.1)}
h1{text-align:center;margin-bottom:15px}
select,input,button{width:100%;padding:12px;margin-top:10px;border-radius:10px;border:1px solid #ccc;font-size:15px}
button{background:#007bff;color:#fff;border:none;font-weight:bold}
button:hover{background:#0056b3}
.entry{background:#f8f9fa;padding:12px;margin-top:10px;border-radius:10px}
.topbar{display:flex;gap:10px}
.topbar input{flex:1}
.total{text-align:center;margin-top:15px;font-size:18px;font-weight:bold}
</style>
</head>

<body>
<div class="container">
<h1>Work Tracker PRO</h1>

<div class="topbar">
<input type="text" id="branchInput" placeholder="Neue Filiale...">
<button onclick="addBranch()">+</button>
</div>

<select id="branch"></select>

<input type="date" id="date">
<input type="time" id="start">
<input type="time" id="end">
<input type="number" id="break" placeholder="Pause (Minuten)" value="0">

<button onclick="addEntry()">Speichern</button>

<div id="list"></div>
<div class="total" id="total">Gesamt: 0 h</div>
</div>

<script>
let entries = JSON.parse(localStorage.getItem("entries")||"[]");
let branches = JSON.parse(localStorage.getItem("branches")||"[\"Hauptfiliale\"]");

function save(){
 localStorage.setItem("entries",JSON.stringify(entries));
 localStorage.setItem("branches",JSON.stringify(branches));
}

function renderBranches(){
 const sel=document.getElementById("branch");
 sel.innerHTML="";
 branches.forEach(b=>{
  const opt=document.createElement("option");
  opt.value=b; opt.textContent=b;
  sel.appendChild(opt);
 });
}

function addBranch(){
 const val=document.getElementById("branchInput").value.trim();
 if(!val) return;
 branches.push(val);
 document.getElementById("branchInput").value="";
 save();
 renderBranches();
}

function addEntry(){
 const branch=document.getElementById("branch").value;
 const date=document.getElementById("date").value;
 const start=document.getElementById("start").value;
 const end=document.getElementById("end").value;
 const br=parseInt(document.getElementById("break").value)||0;

 if(!date||!start||!end) return alert("Bitte alles ausfüllen");

 const s=new Date(`1970-01-01T${start}:00`);
 const e=new Date(`1970-01-01T${end}:00`);
 let diff=(e-s)/1000/60 - br;
 if(diff<0) return alert("Fehler bei Zeit");

 entries.push({branch,date,start,end,break:br,minutes:diff});
 save();
 render();
}

function deleteEntry(i){
 entries.splice(i,1);
 save();
 render();
}

function render(){
 const list=document.getElementById("list");
 list.innerHTML="";
 let total=0;

 entries.forEach((e,i)=>{
  total+=e.minutes;
  const div=document.createElement("div");
  div.className="entry";
  div.innerHTML=`
   <b>${e.branch}</b><br>
   ${e.date}<br>
   ${e.start} - ${e.end} | Pause: ${e.break} min<br>
   <b>${(e.minutes/60).toFixed(2)} h</b>
   <button onclick="deleteEntry(${i})">Löschen</button>
  `;
  list.appendChild(div);
 });

 document.getElementById("total").innerText=
  "Gesamt: "+(total/60).toFixed(2)+" h";
}

renderBranches();
render();
</script>

</body>
</html>
