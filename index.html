<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Arbeitszeit Tracker</title>

<style>
body {
  font-family: Arial;
  background: #f4f6f8;
  margin: 0;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 15px;
}

h2 {
  text-align: center;
}

input {
  width: 70%;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  padding: 12px;
  border: none;
  border-radius: 10px;
  margin-top: 5px;
  font-size: 16px;
}

.add { background: #007bff; color: white; }

.start { background: green; color: white; }
.end { background: red; color: white; }

.card {
  background: white;
  padding: 15px;
  margin-top: 15px;
  border-radius: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.total {
  margin-top: 10px;
  font-weight: bold;
  color: #007bff;
}

.month {
  text-align: center;
  margin-bottom: 10px;
  font-weight: bold;
}

</style>
</head>

<body>

<div class="container">

<h2>Arbeitszeit Tracker</h2>

<div class="month" id="month"></div>

<input id="input" placeholder="Filiale eingeben">
<button class="add" onclick="add()">➕ Hinzufügen</button>

<div id="list"></div>

</div>

<script>

// 📅 Monatssystem
let currentMonth = new Date().toISOString().slice(0,7);
let allData = JSON.parse(localStorage.getItem("allData")) || {};

if (!allData[currentMonth]) {
  allData[currentMonth] = {};
}

let data = allData[currentMonth];

document.getElementById("month").innerText = "Monat: " + currentMonth;

// 💾 speichern
function save() {
  allData[currentMonth] = data;
  localStorage.setItem("allData", JSON.stringify(allData));
}

// ➕ Filiale
function add() {
  let val = document.getElementById("input").value;
  if (!val) return;

  if (!data[val]) data[val] = [];

  document.getElementById("input").value = "";
  save();
  render();
}

// ⏱️ Log
function log(branch, type) {
  data[branch].push({ type, time: new Date() });
  save();
  render();
}

// 🧮 حساب الساعات
function calculate(logs) {
  let total = 0;
  let start = null;

  logs.forEach(l => {
    let t = new Date(l.time);

    if (l.type === "Start") start = t;

    if (l.type === "Ende" && start) {
      total += t - start;
      start = null;
    }
  });

  return (total / 1000 / 60 / 60).toFixed(2);
}

// 🖥️ عرض
function render() {
  let list = document.getElementById("list");
  list.innerHTML = "";

  for (let branch in data) {

    let logs = "";
    data[branch].forEach(l => {
      logs += `<div>${l.type} - ${new Date(l.time).toLocaleTimeString()}</div>`;
    });

    let total = calculate(data[branch]);

    list.innerHTML += `
      <div class="card">
        <b>${branch}</b><br>

        <button class="start" onclick="log('${branch}','Start')">Start</button>
        <button class="end" onclick="log('${branch}','Ende')">Ende</button>

        ${logs}

        <div class="total">Gesamt: ${total} h</div>
      </div>
    `;
  }
}

render();

</script>

</body>
</html>
