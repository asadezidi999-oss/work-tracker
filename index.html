<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Arbeitszeit Tracker Pro</title>

<link rel="manifest" href="manifest.json">

<style>
body {
  font-family: Arial;
  background: #f4f6f8;
  padding: 20px;
}

.container {
  max-width: 500px;
  margin: auto;
}

h2 {
  text-align: center;
}

input, select {
  width: 100%;
  padding: 12px;
  margin-top: 5px;
  border-radius: 8px;
}

button {
  padding: 12px;
  margin: 5px 0;
  width: 100%;
  border: none;
  border-radius: 10px;
  font-size: 16px;
}

.start { background: green; color: white; }
.end { background: red; color: white; }
.delete { background: black; color: white; }
.card {
  background: white;
  padding: 15px;
  margin-top: 15px;
  border-radius: 12px;
}

</style>

</head>

<body>

<div class="container">

<h2>Arbeitszeit Tracker</h2>

<!-- Passwort -->
<div id="login">
  <input type="password" id="pass" placeholder="Passwort">
  <button onclick="checkPass()">Login</button>
</div>

<div id="app" style="display:none">

<select id="monthSelect" onchange="changeMonth()"></select>

<input id="input" placeholder="Filiale">
<button onclick="add()">➕ Hinzufügen</button>
<button onclick="exportPDF()">📤 PDF</button>
<button onclick="resetData()">🧹 Reset</button>

<div id="list"></div>

</div>

</div>

<script>

let PASSWORD = "1234";

// 🔐 Login
function checkPass() {
  let p = document.getElementById("pass").value;
  if (p === PASSWORD) {
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";
  } else {
    alert("Falsch!");
  }
}

// 📅 Monate
let allData = JSON.parse(localStorage.getItem("allData")) || {};
let currentMonth = new Date().toISOString().slice(0,7);

if (!allData[currentMonth]) allData[currentMonth] = {};
let data = allData[currentMonth];

function save() {
  allData[currentMonth] = data;
  localStorage.setItem("allData", JSON.stringify(allData));
}

// 📅 Dropdown
function loadMonths() {
  let select = document.getElementById("monthSelect");
  select.innerHTML = "";

  for (let m in allData) {
    let opt = document.createElement("option");
    opt.value = m;
    opt.text = m;
    if (m === currentMonth) opt.selected = true;
    select.appendChild(opt);
  }
}

function changeMonth() {
  currentMonth = document.getElementById("monthSelect").value;
  if (!allData[currentMonth]) allData[currentMonth] = {};
  data = allData[currentMonth];
  render();
}

// ➕
function add() {
  let val = document.getElementById("input").value;
  if (!val) return;

  if (!data[val]) data[val] = [];

  document.getElementById("input").value = "";
  save();
  render();
}

// ⏱️
function log(branch, type) {
  data[branch].push({ type, time: new Date() });
  save();
  render();
}

// 🧮 حساب أسبوعي
function calculate(logs) {
  let total = 0;
  let start = null;

  logs.forEach(l => {
    let t = new Date(l.time);

    if (l.type === "Start") start = t;
    if (l.type === "Ende" && start) {
      total += t - start;
      start = null;
    }
  });

  return (total/1000/60/60).toFixed(2);
}

// 📤 PDF
function exportPDF() {
  alert("PDF später hinzufügen");
}

// 🧹
function resetData() {
  if (confirm("Alles löschen?")) {
    data = {};
    save();
    render();
  }
}

// ❌
function deleteLog(b, i) {
  data[b].splice(i,1);
  save();
  render();
}

// 🖥️
function render() {
  let list = document.getElementById("list");
  list.innerHTML = "";

  for (let branch in data) {
    let logs = "";
    data[branch].forEach((l,i)=>{
      logs += `${l.type} - ${new Date(l.time).toLocaleTimeString()}
      <button onclick="deleteLog('${branch}',${i})">❌</button><br>`;
    });

    let total = calculate(data[branch]);

    list.innerHTML += `
      <div class="card">
        <b>${branch}</b><br>

        <button class="start" onclick="log('${branch}','Start')">Start</button>
        <button class="end" onclick="log('${branch}','Ende')">Ende</button>

        ${logs}

        <b>Woche: ${total} h</b>
      </div>
    `;
  }

  loadMonths();
}

// Service Worker
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}

</script>

</body>
</html>
