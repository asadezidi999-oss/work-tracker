<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Arbeitszeit Tracker PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  font-family: Arial;
  background:#1e1e1e;
  color:white;
  margin:0;
}
.container {
  max-width:500px;
  margin:auto;
  padding:15px;
}
h2 { text-align:center; }

input, select {
  width:100%;
  padding:14px;
  margin-top:8px;
  border-radius:10px;
  border:none;
}

button {
  padding:14px;
  margin-top:6px;
  border:none;
  border-radius:12px;
  font-size:16px;
}

.add { background:#007bff; color:white; }
.start { background:green; color:white; }
.pause { background:orange; color:white; }
.resume { background:teal; color:white; }
.end { background:red; color:white; }

.card {
  background:#2a2a2a;
  padding:15px;
  margin-top:15px;
  border-radius:12px;
}

.total { color:#4da3ff; font-weight:bold; }

.login {
  text-align:center;
  margin-top:100px;
}
</style>

</head>

<body>

<div class="container">

<!-- LOGIN -->
<div id="login" class="login">
  <h2>Login</h2>
  <input type="password" id="pass" placeholder="Passwort">
  <button onclick="checkPass()">Login</button>
</div>

<!-- APP -->
<div id="app" style="display:none">

<h2>Arbeitszeit Tracker</h2>

<select id="monthSelect" onchange="changeMonth()"></select>

<input type="date" id="date">

<input id="input" placeholder="Filiale">
<button class="add" onclick="add()">➕ Hinzufügen</button>
<button onclick="exportPDF()">📤 PDF</button>

<div id="list"></div>

</div>

</div>

<script>

// 🔐 Passwort
let PASSWORD="1234";

// LOGIN
function checkPass(){
  let p=document.getElementById("pass").value;
  if(p===PASSWORD){
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";
  } else {
    alert("Falsch!");
  }
}

// 📅 Daten
let allData=JSON.parse(localStorage.getItem("allData"))||{};
let currentMonth=new Date().toISOString().slice(0,7);

if(!allData[currentMonth]) allData[currentMonth]={};
let data=allData[currentMonth];

function save(){
  allData[currentMonth]=data;
  localStorage.setItem("allData",JSON.stringify(allData));
}

// 📅 Monat Auswahl
function loadMonths(){
  let s=document.getElementById("monthSelect");
  s.innerHTML="";
  for(let m in allData){
    let o=document.createElement("option");
    o.value=m;
    o.text=m;
    if(m===currentMonth) o.selected=true;
    s.appendChild(o);
  }
}

function changeMonth(){
  currentMonth=document.getElementById("monthSelect").value;
  if(!allData[currentMonth]) allData[currentMonth]={};
  data=allData[currentMonth];
  render();
}

// ➕ Filiale
function add(){
  let v=document.getElementById("input").value;
  if(!v) return;
  if(!data[v]) data[v]=[];
  document.getElementById("input").value="";
  save(); render();
}

// ⏱️ Log
function log(b,t){

  let now=new Date();
  let chosenDate=document.getElementById("date").value;

  if(chosenDate){
    let d=new Date(chosenDate);
    d.setHours(now.getHours(),now.getMinutes());
    now=d;
  }

  data[b].push({type:t,time:now});
  save(); render();
}

// ✏️ تعديل الوقت (مستقر)
function editTime(branch,index,input){

  let val=input.value;
  if(val.length<5) return;

  let d=new Date(data[branch][index].time);
  let [h,m]=val.split(":");

  d.setHours(parseInt(h));
  d.setMinutes(parseInt(m));

  data[branch][index].time=d;
  save();
}

// 🧮 حساب
function calc(logs){
  let total=0,start=null,pause=0,pStart=null;

  logs.forEach(l=>{
    let t=new Date(l.time);

    if(l.type==="Start") start=t;
    if(l.type==="Pause Start") pStart=t;

    if(l.type==="Pause Ende" && pStart){
      pause+=t-pStart;
      pStart=null;
    }

    if(l.type==="Ende" && start){
      total+=t-start-pause;
      start=null;
      pause=0;
    }
  });

  return (total/1000/60/60).toFixed(2);
}

// 📅 تنسيق التاريخ
function formatDate(d){
  let dt=new Date(d);
  return dt.toLocaleDateString()+" - "+dt.toLocaleTimeString().slice(0,5);
}

// 🖥️ عرض
function render(){
  let list=document.getElementById("list");
  list.innerHTML="";

  for(let b in data){

    let logs="";
    data[b].forEach((l,i)=>{

      let time=new Date(l.time).toTimeString().slice(0,5);

      logs+=`
      ${l.type} - ${formatDate(l.time)}
      <input value="${time}" oninput="editTime('${b}',${i},this)">
      <button onclick="del('${b}',${i})">❌</button><br>`;
    });

    list.innerHTML+=`
    <div class="card">
      <b>${b}</b>
      <button onclick="deleteBranch('${b}')">🗑️</button><br>

      <button class="start" onclick="log('${b}','Start')">Start</button>
      <button class="pause" onclick="log('${b}','Pause Start')">Pause</button>
      <button class="resume" onclick="log('${b}','Pause Ende')">Weiter</button>
      <button class="end" onclick="log('${b}','Ende')">Ende</button>

      ${logs}

      <div class="total">Gesamt: ${calc(data[b])} h</div>
    </div>`;
  }

  loadMonths();
}

// ❌ حذف سجل
function del(b,i){
  data[b].splice(i,1);
  save(); render();
}

// 🧹 حذف فرع
function deleteBranch(branch){
  if(confirm("Filiale löschen?")){
    delete data[branch];
    save(); render();
  }
}

// 📤 PDF
function exportPDF(){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF();
  let y=10;

  doc.text("Arbeitszeit Bericht",10,y); y+=10;

  for(let b in data){
    doc.text("Filiale: "+b,10,y); y+=6;

    data[b].forEach(l=>{
      doc.text(l.type+" "+new Date(l.time).toLocaleString(),10,y);
      y+=5;
    });

    y+=5;
  }

  doc.save("arbeitszeit.pdf");
}

render();

</script>

</body>
</html>
